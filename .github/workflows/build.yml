name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: false
        default: 'all'
        type: choice
        options: [all, macos, linux, windows]
      create_release:
        description: 'Create a GitHub release with artifacts'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # macOS — Swift camera server + Nuitka Python app → .dmg (ARM64)
  # ---------------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    if: github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'macos'
    steps:
      - uses: actions/checkout@v4

      - name: Verify required files
        run: |
          missing=()
          for f in data/hip8_database.npz data/VERSION.json marketing/logo.png marketing/inapp-title.png; do
            [ -f "$f" ] || missing+=("$f")
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: Required files missing:"
            printf '  %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="$(python3 -c "import json; print(json.load(open('data/VERSION.json'))['app_version'])")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Update VERSION.json so the built app has the correct version
          python3 -c "
          import json
          with open('data/VERSION.json', 'r') as f:
              data = json.load(f)
          data['app_version'] = '$VERSION'
          with open('data/VERSION.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/uv
          key: macos-uv-${{ hashFiles('pyproject.toml', 'uv.lock', '.python-version') }}
          restore-keys: macos-uv-

      - name: Install dependencies
        # uv reads .python-version (3.12.13) and installs the standalone
        # python-build-standalone interpreter on demand. We need that
        # specifically — pyenv/Homebrew Python links _ssl/_hashlib/_blake2
        # against Homebrew dylibs and Nuitka's macOS dep scanner crashes
        # on those paths.
        run: uv sync

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: camera/mac/.build
          key: macos-swift-${{ hashFiles('camera/mac/Package.swift', 'camera/mac/Sources/**/*.swift') }}
          restore-keys: macos-swift-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build .app + .dmg
        # scripts/build_mac.sh handles: Swift camera server, React UI,
        # Nuitka --mode=app (Info.plist via flags, NSCameraUsageDescription
        # via --macos-app-protected-resource), bundle assembly, DMG creation.
        run: bash scripts/build_mac.sh

      - name: Rename DMG for artifact upload
        run: mv build/PushNav.dmg build/PushNav-macOS-arm64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PushNav-macOS-arm64
          path: build/PushNav-macOS-arm64.dmg
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Linux — C/V4L2 camera server + Nuitka Python app → tar.gz + AppImage
  # ---------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'linux'
    steps:
      - uses: actions/checkout@v4

      - name: Verify required files
        run: |
          missing=()
          for f in data/hip8_database.npz data/VERSION.json marketing/logo.png marketing/inapp-title.png; do
            [ -f "$f" ] || missing+=("$f")
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: Required files missing:"
            printf '  %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="$(python3 -c "import json; print(json.load(open('data/VERSION.json'))['app_version'])")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          python3 -c "
          import json
          with open('data/VERSION.json', 'r') as f:
              data = json.load(f)
          data['app_version'] = '$VERSION'
          with open('data/VERSION.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

      - name: Detect architecture
        id: arch
        run: echo "arch=$(uname -m)" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # libjpeg-dev/libfuse2/patchelf for camera_server + AppImage tooling.
          # python3-gi + gir1.2-webkit2-4.1 for pywebview's GTK backend.
          sudo apt-get install -y gcc libjpeg-dev libfuse2 patchelf \
              python3-gi gir1.2-webkit2-4.1

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: linux-uv-${{ hashFiles('pyproject.toml', 'uv.lock', '.python-version') }}
          restore-keys: linux-uv-

      - name: Install dependencies
        # Linux must use the *system* Python, not uv-managed standalone:
        # pywebview's GTK backend needs PyGObject ('gi') which ships only
        # as a distro package and is not on PyPI. --system-site-packages
        # makes 'gi' / WebKit2 visible to the venv. Override .python-version
        # with the explicit system Python path.
        run: |
          uv venv --python /usr/bin/python3.12 --system-site-packages
          uv sync

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build tar.gz + AppImage
        # scripts/build_linux.sh handles: C camera server, React UI,
        # Nuitka standalone, release dir assembly, tar.gz + AppImage.
        run: bash scripts/build_linux.sh

      - name: Rename AppImage for artifact upload
        # Script outputs PushNav-${ARCH}.AppImage; GHA workflow expects
        # PushNav-linux-${ARCH}.AppImage.
        run: |
          ARCH="${{ steps.arch.outputs.arch }}"
          mv "build/PushNav-${ARCH}.AppImage" "build/PushNav-linux-${ARCH}.AppImage"

      - name: Upload tar.gz artifact
        uses: actions/upload-artifact@v4
        with:
          name: PushNav-linux-tar
          path: build/PushNav-linux-${{ steps.arch.outputs.arch }}.tar.gz
          retention-days: 90

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: PushNav-linux-AppImage
          path: build/PushNav-linux-${{ steps.arch.outputs.arch }}.AppImage
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Windows — C/DirectShow camera server + Nuitka Python app → zip + installer
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    if: github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'windows'
    steps:
      - uses: actions/checkout@v4

      - name: Verify required files
        shell: pwsh
        run: |
          $required = @(
            "data/hip8_database.npz",
            "data/VERSION.json",
            "marketing/logo.ico",
            "marketing/inapp-title.png"
          )
          $missing = $required | Where-Object { -not (Test-Path $_) }
          if ($missing) {
            Write-Error "Required files missing:`n  $($missing -join "`n  ")"
            exit 1
          }

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/v*") {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $version = (Get-Content data/VERSION.json | ConvertFrom-Json).app_version
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          # Update VERSION.json
          $json = Get-Content data/VERSION.json | ConvertFrom-Json
          $json.app_version = $version
          $json | ConvertTo-Json | Set-Content data/VERSION.json

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\uv\cache
          key: windows-uv-${{ hashFiles('pyproject.toml', 'uv.lock', '.python-version') }}
          restore-keys: windows-uv-

      - name: Install dependencies
        # uv reads .python-version (3.12.13). Within the
        # requires-python = ">=3.12,<3.14" cap that pythonnet imposes
        # via pywebview's WinForms backend.
        run: uv sync

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build zip + installer
        # scripts\build_windows.bat handles: C camera server, React UI,
        # Nuitka standalone, release dir assembly, zip, Inno Setup installer.
        shell: cmd
        run: scripts\build_windows.bat

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: PushNav-windows-zip
          path: build/PushNav-windows-x64.zip
          retention-days: 90

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PushNav-windows-setup
          path: build/PushNav-windows-x64-setup.exe
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Create GitHub Release (only on tag push or manual with create_release)
  # ---------------------------------------------------------------------------
  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release == true)
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.dmg" -o -name "*.tar.gz" -o -name "*.zip" -o -name "*.AppImage" -o -name "*.exe" \) \
            | sort \
            | while read -r f; do
                sha256sum "$f"
              done > ../checksums-sha256.txt
          cat ../checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PushNav ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/PushNav-macOS-arm64/PushNav-macOS-arm64.dmg
            artifacts/PushNav-linux-tar/PushNav-linux-*.tar.gz
            artifacts/PushNav-linux-AppImage/PushNav-linux-*.AppImage
            artifacts/PushNav-windows-zip/PushNav-windows-x64.zip
            artifacts/PushNav-windows-setup/PushNav-windows-x64-setup.exe
            checksums-sha256.txt
